<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>股票估值查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
            background: #f5f7fa;
        }
        .title {
            text-align: center;
            margin-bottom: 20px;
            color: #2d3748;
        }
        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background: #e2e8f0;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: #3182ce;
            color: white;
        }
        .stock-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stock-info {
            flex: 2;
        }
        .stock-name {
            font-size: 18px;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .plate-tag {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 4px;
            color: white;
            font-weight: normal;
        }
        .tag-main { background-color: #48bb78; }
        .tag-gem { background-color: #ed8936; }
        .tag-tech { background-color: #9f7aea; }
        .stock-code {
            color: #3182ce;
            font-size: 14px;
            cursor: pointer;
            text-decoration: underline;
            margin-bottom: 4px;
            display: block;
        }
        .stock-price {
            font-size: 14px;
            color: #e53e3e;
        }
        .stock-price.loading {
            color: #999;
        }
        .valuation {
            flex: 1;
            text-align: right;
        }
        .val-title {
            font-size: 14px;
            color: #718090;
            margin-bottom: 5px;
        }
        .val-range {
            font-size: 18px;
            font-weight: bold;
            color: #3182ce;
        }
    </style>
</head>
<body>
    <h1 class="title">股票估值查询</h1>

    <div class="filter-tabs">
        <button class="tab-btn" data-type="all">全部</button>
        <button class="tab-btn active" data-type="main">沪深主板</button>
        <button class="tab-btn" data-type="gem">创业板</button>
        <button class="tab-btn" data-type="tech">科创板</button>
    </div>

    <div id="stockList"></div>

    <script>
        let allStockList = [];
        let priceCache = new Map();
        let isRequesting = false;

        // 页面加载
        window.onload = async () => {
            const res = await fetch('./stockConfig.json');
            allStockList = await res.json();
			allStockList.sort((a,b)=>{return a.stockId - b.stockId;})
            switchTab('main');
        };

        // 绑定按钮点击
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                switchTab(btn.dataset.type);
            };
        });

        // 切换板块
        async function switchTab(type) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-type="${type}"]`).classList.add('active');

            let list = allStockList;
            if (type !== 'all') {
                list = allStockList.filter(s => getPlateType(s.stockId) === type);
            }

            render(list);
            await loadPricesSlowly(list);
        }

        // 队列请求：0.5秒一个
        async function loadPricesSlowly(stockList) {
            if (isRequesting) return;
            isRequesting = true;

            for (let stock of stockList) {
                const code = stock.stockId;
                if (!priceCache.has(code)) {
                    await getStockPrice(code);
                    render(stockList);
                    await delay(300);
                }
            }

            isRequesting = false;
        }

        // 获取价格 ✅ 修复：除以 100
        async function getStockPrice(stockCode) {
            try {
                const secid = stockCode.startsWith('6') ? `1.${stockCode}` : `0.${stockCode}`;
                const res = await fetch(`https://push2.eastmoney.com/api/qt/stock/get?secid=${secid}&fields=f43`, {
                    headers: { Referer: 'https://www.eastmoney.com/' }
                });
                const data = await res.json();
                let price = '失败';
                if (data.data?.f43) {
                    price = (data.data.f43 / 100).toFixed(2); // ✅ 这里除以100，保留2位小数
                }
                priceCache.set(stockCode, price);
            } catch (e) {
                priceCache.set(stockCode, '失败');
            }
        }

        function delay(ms) {
            return new Promise(r => setTimeout(r, ms));
        }

        function getPlateType(code) {
            if (code.startsWith('688')) return 'tech';
            if (code.startsWith('300')) return 'gem';
            return 'main';
        }

        function getPlateTag(code) {
            if (code.startsWith('688')) return '<span class="plate-tag tag-tech">科创板</span>';
            if (code.startsWith('300')) return '<span class="plate-tag tag-gem">创业板</span>';
            return '<span class="plate-tag tag-main">沪深主板</span>';
        }

        function getEastmoneyUrl(code) {
            if (code.startsWith('688')) return `https://quote.eastmoney.com/kcb/${code}.html`;
            if (code.startsWith('6')) return `https://quote.eastmoney.com/sh${code}.html`;
            return `https://quote.eastmoney.com/sz${code}.html`;
        }

        // 渲染
        function render(list) {
            const el = document.getElementById('stockList');
            let html = '';
            list.forEach(s => {
                const price = priceCache.get(s.stockId) || '加载中...';
                html += `
                <div class="stock-card">
                    <div class="stock-info">
                        <div class="stock-name">${s.stockName} ${getPlateTag(s.stockId)}</div>
                        <div class="stock-code" onclick="window.open('${getEastmoneyUrl(s.stockId)}')">${s.stockId}</div>
                        <div class="stock-price ${priceCache.has(s.stockId) ? '' : 'loading'}">
                            当前价：¥${price}
                        </div>
                    </div>
                    <div class="valuation">
                        <div class="val-title">估值区间</div>
                        <div class="val-range">${s.valuationRange.low} ~ ${s.valuationRange.high}</div>
                    </div>
                </div>`;
            });
            el.innerHTML = html || '<p style="text-align:center;color:#999">该板块暂无股票</p>';
        }
    </script>
</body>
</html>
