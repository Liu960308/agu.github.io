<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>估值查看器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
            background: #f5f7fa;
        }
        .title {
            text-align: center;
            margin-bottom: 30px;
            color: #2d3748;
        }
        .stock-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stock-info {
            flex: 2;
        }
        .stock-name {
            font-size: 18px;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 5px;
        }
        .stock-id {
            color: #718096;
            font-size: 14px;
        }
        .valuation {
            flex: 1;
            text-align: right;
        }
        .val-title {
            font-size: 14px;
            color: #718096;
            margin-bottom: 5px;
        }
        .val-range {
            font-size: 18px;
            font-weight: bold;
            color: #3182ce;
        }
        .tips {
            text-align: center;
            margin-top: 20px;
            color: #a0aec0;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <h1 class="title">股票估值配置表</h1>
    <div id="stockList"></div>
    <p class="tips">提示：修改 stockConfig.json 文件即可更新股票配置</p>

    <script>
        // 读取本地JSON配置文件
        async function loadStockConfig() {
            try {
                // 读取同级目录下的 stockConfig.json
                const response = await fetch('./stockConfig.json');
                const stockList = await response.json();
                renderStockList(stockList);
            } catch (error) {
                document.getElementById('stockList').innerHTML = 
                    '<p style="text:center;color:red;">读取配置失败，请检查JSON文件是否存在</p>';
                console.error('读取JSON失败：', error);
            }
        }

        // 渲染股票列表到页面
        function renderStockList(stockList) {
            const container = document.getElementById('stockList');
            let html = '';

            stockList.forEach(stock => {
                html += `
                <div class="stock-card">
                    <div class="stock-info">
                        <div class="stock-name">${stock.stockName}</div>
                        <div class="stock-id">股票ID：${stock.stockId}</div>
                    </div>
                    <div class="valuation">
                        <div class="val-title">估值区间</div>
                        <div class="val-range">${stock.valuationRange.low} ~ ${stock.valuationRange.high}</div>
                    </div>
                </div>
                `;
            });

            container.innerHTML = html;
        }

        // 页面加载时执行
        window.onload = loadStockConfig;
    </script>
</body>
</html>
