<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>股票估值配置</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
            background: #f5f7fa;
        }
        .title {
            text-align: center;
            margin-bottom: 30px;
            color: #2d3748;
        }
        .stock-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stock-info {
            flex: 2;
        }
        .stock-name {
            font-size: 18px;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 5px;
        }
        .stock-code {
            color: #3182ce;
            font-size: 14px;
            cursor: pointer;
            text-decoration: underline;
        }
        .valuation {
            flex: 1;
            text-align: right;
        }
        .val-title {
            font-size: 14px;
            color: #718090;
            margin-bottom: 5px;
        }
        .val-range {
            font-size: 18px;
            font-weight: bold;
            color: #3182ce;
        }
    </style>
</head>
<body>
    <h1 class="title">股票估值配置表</h1>
    <div id="stockList"></div>

    <script>
        async function loadStockConfig() {
            try {
                const res = await fetch('./stockConfig.json');
                const list = await res.json();
                list.sort((a, b) => parseInt(a.stockId) - parseInt(b.stockId));
                render(list);
            } catch (err) {
                document.getElementById('stockList').innerHTML = '<p style="color:red;">读取配置失败</p>';
            }
        }

        // 生成东方财富正确链接
        function getEastmoneyUrl(code) {
            if (code.startsWith('688')) {
                // 科创板
                return `https://quote.eastmoney.com/kcb/${code}.html`;
            } else if (code.startsWith('6')) {
                // 沪市
                return `https://quote.eastmoney.com/sh${code}.html`;
            } else {
                // 深市（0、3开头）
                return `https://quote.eastmoney.com/sz${code}.html`;
            }
        }

        function render(stockList) {
            const el = document.getElementById('stockList');
            let html = '';
            stockList.forEach(s => {
                const url = getEastmoneyUrl(s.stockId);
                html += `
                <div class="stock-card">
                    <div class="stock-info">
                        <div class="stock-name">${s.stockName}</div>
                        <div class="stock-code" onclick="window.open('${url}')">
                            ${s.stockId}（点击查看行情）
                        </div>
                    </div>
                    <div class="valuation">
                        <div class="val-title">估值区间</div>
                        <div class="val-range">${s.valuationRange.low} ~ ${s.valuationRange.high}</div>
                    </div>
                </div>
                `;
            });
            el.innerHTML = html;
        }

        window.onload = loadStockConfig;
    </script>
</body>
</html>
