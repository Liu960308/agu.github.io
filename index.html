<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>估值查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
            background: #f5f7fa;
        }
        .title {
            text-align: center;
            margin-bottom: 20px;
            color: #2d3748;
        }
        /* 板块筛选按钮 */
        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background: #e2e8f0;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: #3182ce;
            color: white;
        }
        .stock-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stock-info {
            flex: 2;
        }
        .stock-name {
            font-size: 18px;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .plate-tag {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 4px;
            color: white;
            font-weight: normal;
        }
        .tag-main { background-color: #48bb78; } /* 主板绿 */
        .tag-gem { background-color: #ed8936; } /* 创业橙 */
        .tag-tech { background-color: #9f7aea; } /* 科创紫 */
        .stock-code {
            color: #3182ce;
            font-size: 14px;
            cursor: pointer;
            text-decoration: underline;
            margin-bottom: 4px;
            display: block;
        }
        .stock-price {
            font-size: 14px;
            color: #e53e3e; /* 红色突出股价 */
        }
        .stock-price.loading {
            color: #999;
        }
        .valuation {
            flex: 1;
            text-align: right;
        }
        .val-title {
            font-size: 14px;
            color: #718090;
            margin-bottom: 5px;
        }
        .val-range {
            font-size: 18px;
            font-weight: bold;
            color: #3182ce;
        }
    </style>
</head>
<body>
    <h1 class="title">估值查询</h1>

    <!-- 筛选切换按钮 -->
    <div class="filter-tabs">
        <button class="tab-btn active" onclick="filterByPlate('all')">全部</button>
        <button class="tab-btn" onclick="filterByPlate('main')">沪深主板</button>
        <button class="tab-btn" onclick="filterByPlate('gem')">创业板</button>
        <button class="tab-btn" onclick="filterByPlate('tech')">科创板</button>
    </div>

    <div id="stockList"></div>

    <script>
        let allStockList = []; // 保存全部股票
        const priceCache = new Map(); // 缓存股价，避免重复请求

        // 1. 加载JSON并获取股价
        async function loadStockConfig() {
            try {
                const res = await fetch('./stockConfig.json');
                allStockList = await res.json();
                allStockList.sort((a, b) => parseInt(a.stockId) - parseInt(b.stockId));
                
                // 预加载所有股票的股价
                await Promise.all(
                    allStockList.map(stock => getStockPrice(stock.stockId))
                );
                
                render(allStockList);
            } catch (err) {
                document.getElementById('stockList').innerHTML = '<p style="color:red;">读取配置失败</p>';
            }
        }

        // 2. 板块筛选切换
        function filterByPlate(plateType) {
            // 按钮高亮
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            let filteredList = [];
            if (plateType === 'all') {
                filteredList = allStockList;
            } else {
                filteredList = allStockList.filter(s => getPlateType(s.stockId) === plateType);
            }
            render(filteredList);
        }

        // 3. 获取板块类型（用于筛选）
        function getPlateType(code) {
            if (code.startsWith('688')) return 'tech';
            if (code.startsWith('300')) return 'gem';
            return 'main';
        }

        // 4. 获取板块标签（用于显示）
        function getPlateTag(code) {
            if (code.startsWith('688')) return '<span class="plate-tag tag-tech">科创板</span>';
            if (code.startsWith('300')) return '<span class="plate-tag tag-gem">创业板</span>';
            return '<span class="plate-tag tag-main">沪深主板</span>';
        }

        // 5. 东方财富跳转
        function getEastmoneyUrl(code) {
            if (code.startsWith('688')) return `https://quote.eastmoney.com/kcb/${code}.html`;
            if (code.startsWith('6')) return `https://quote.eastmoney.com/sh${code}.html`;
            return `https://quote.eastmoney.com/sz${code}.html`;
        }

        // 6. 获取股票实时价格（核心：东方财富接口）
        async function getStockPrice(stockCode) {
            // 优先读取缓存
            if (priceCache.has(stockCode)) {
                return priceCache.get(stockCode);
            }

            try {
                // 东方财富行情接口（拼接市场编码）
                let marketCode = '';
                if (stockCode.startsWith('6')) {
                    marketCode = '1.' + stockCode; // 沪市
                } else {
                    marketCode = '0.' + stockCode; // 深市
                }

                // 请求实时股价
                const res = await fetch(
                    `https://push2.eastmoney.com/api/qt/stock/get?secid=${marketCode}&fields=f43`,
                    {
                        method: 'GET',
                        mode: 'cors', // 跨域处理
                        headers: {
                            'Referer': 'https://www.eastmoney.com/', // 模拟来源，避免接口拦截
                            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
                        }
                    }
                );

                const data = await res.json();
                const price = data.data?.f43 || '获取失败'; // f43 对应最新价字段
                priceCache.set(stockCode, price); // 存入缓存
                return price;
            } catch (err) {
                priceCache.set(stockCode, '获取失败');
                return '获取失败';
            }
        }

        // 7. 渲染页面（新增股价显示）
        function render(list) {
            const el = document.getElementById('stockList');
            let html = '';
            list.forEach(s => {
                const url = getEastmoneyUrl(s.stockId);
                const tag = getPlateTag(s.stockId);
                const price = priceCache.get(s.stockId) || '加载中...';
                const priceClass = price === '加载中...' ? 'loading' : '';

                html += `
                <div class="stock-card">
                    <div class="stock-info">
                        <div class="stock-name">${s.stockName} ${tag}</div>
                        <div class="stock-code" onclick="window.open('${url}')">
                            ${s.stockId}（点击查看行情）
                        </div>
                        <div class="stock-price ${priceClass}">
                            当前股价：¥${price/100}
                        </div>
                    </div>
                    <div class="valuation">
                        <div class="val-title">估值区间</div>
                        <div class="val-range">${s.valuationRange.low} ~ ${s.valuationRange.high}</div>
                    </div>
                </div>`;
            });
            el.innerHTML = html || '<p style="text-align:center;color:#999">该板块暂无股票</p>';
        }

        window.onload = loadStockConfig;
    </script>
</body>
</html>
